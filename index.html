<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download My App</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh; /* changed to min-height to support spacing */
    color:white;
}
.box{
    background:rgba(255,255,255,0.1);
    padding:40px;
    border-radius:20px;
    text-align:center;
    backdrop-filter:blur(10px);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
    width: 350px;
}
h1{
    margin-top:0;
}
p{
    color:#ddd;
}
.btn{
    margin-top:15px;
    padding:15px 35px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#00c853;
    color:white;
    cursor:pointer;
    transition:.3s;
    display: inline-block;
    text-decoration: none;
    width: 80%;
}
.btn:hover{
    background:#00a844;
    transform:scale(1.05);
}
.upload-btn {
    background: #007bff;
}
.upload-btn:hover {
    background: #0056b3;
}
input[type="file"] {
    margin-top: 20px;
    color: #ddd;
}
#status {
    margin-top: 10px;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="box">
    <h1>Download My App</h1>
    <p>Click below to download the APK.</p>

    <a href="app-release.apk" download class="btn">⬇ Download APK</a>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.2);">

    <h1>Upload to GitHub</h1>
    <p>Select a new APK to push to GitHub.</p>
    
    <input type="file" id="apkInput" accept=".apk">
    <button class="btn upload-btn" onclick="uploadToGithub()">⬆ Upload to GitHub</button>
    <div id="status"></div>
</div>

<script>
    // WARNING: Exposing personal tokens in frontend HTML is unsafe for public sites. Use only locally.
    const GITHUB_TOKEN = 'YOUR_GITHUB_PERSONAL_ACCESS_TOKEN'; 
    const REPO_OWNER = 'YourUsername';
    const REPO_NAME = 'YourRepository';
    const FILE_PATH = 'app-release.apk'; // The path in your repo where you want it saved

    async function uploadToGithub() {
        const fileInput = document.getElementById('apkInput');
        const status = document.getElementById('status');
        
        if (fileInput.files.length === 0) {
            status.innerText = "Please choose a file first.";
            status.style.color = "#ff4d4d";
            return;
        }

        const file = fileInput.files[0];
        status.innerText = "Reading file...";
        status.style.color = "#ddd";

        const reader = new FileReader();
        reader.onload = async function(e) {
            const base64Content = e.target.result.split(',')[1];
            status.innerText = "Uploading to GitHub...";

            try {
                // Optional step: Check if file exists to get its SHA hash (required by GitHub to overwrite files)
                let sha = "";
                const checkRes = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` }
                });
                if (checkRes.ok) {
                    const fileData = await checkRes.json();
                    sha = fileData.sha;
                }

                // Upload/Update request
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Updated APK via Web UI`,
                        content: base64Content,
                        sha: sha || undefined
                    })
                });

                if (response.ok) {
                    status.innerText = "Success! Uploaded to GitHub.";
                    status.style.color = "#00c853";
                } else {
                    const err = await response.json();
                    status.innerText = "Error: " + err.message;
                    status.style.color = "#ff4d4d";
                }
            } catch (error) {
                status.innerText = "Network error occurred.";
                status.style.color = "#ff4d4d";
            }
        };
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
