<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download My App</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    color: white;
}
.box {
    background: rgba(255, 255, 255, 0.1);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    width: 380px;
}
h1 {
    margin-top: 0;
    font-size: 28px;
}
p {
    color: #ddd;
    font-size: 14px;
    line-height: 1.5;
}
.btn {
    margin-top: 15px;
    padding: 15px 35px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #00c853;
    color: white;
    cursor: pointer;
    transition: .3s;
    display: inline-block;
    text-decoration: none;
    width: 80%;
    box-sizing: border-box;
}
.btn:hover {
    background: #00a844;
    transform: scale(1.05);
}
.upload-btn {
    background: #2f7cf6;
}
.upload-btn:hover {
    background: #1961d3;
}
input[type="file"] {
    margin-top: 20px;
    color: #ddd;
    font-size: 14px;
}
hr {
    margin: 30px 0;
    border: 0;
    border-top: 1px solid rgba(255, 255, 255, 0.2);
}
#status {
    margin-top: 15px;
    font-size: 14px;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="box">
    <h1>Download My App</h1>
    <p>Click the button below to download the latest version of the APK.</p>

    <a href="app-release.apk" download class="btn">⬇ Download APK</a>

    <hr>

    <h1>Upload to GitHub</h1>
    <p>Select a new <code>app-release.apk</code> file to update your GitHub repository.</p>
    
    <input type="file" id="apkInput" accept=".apk">
    <button class="btn upload-btn" onclick="uploadToGithub()">⬆ Upload to GitHub</button>
    
    <div id="status"></div>
</div>

<script>
    // --- GITHUB CONFIGURATION ---
    // Note: Keep this file private if your token is embedded here!
    const GITHUB_TOKEN = 'YOUR_GITHUB_PERSONAL_ACCESS_TOKEN'; 
    const REPO_OWNER = 'YourGitHubUsername';
    const REPO_NAME = 'YourRepositoryName';
    const FILE_PATH = 'app-release.apk'; // Path inside your repository

    async function uploadToGithub() {
        const fileInput = document.getElementById('apkInput');
        const status = document.getElementById('status');
        
        if (fileInput.files.length === 0) {
            status.innerText = "Please select an APK file first.";
            status.style.color = "#ff4d4d";
            return;
        }

        const file = fileInput.files[0];
        status.innerText = "Reading file data...";
        status.style.color = "#ddd";

        const reader = new FileReader();
        reader.onload = async function(e) {
            // Extract pure Base64 content from the data URL
            const base64Content = e.target.result.split(',')[1];
            status.innerText = "Connecting to GitHub...";

            try {
                // 1. Check if the file already exists to get its unique SHA hash
                // (GitHub API requires the current file's SHA to overwrite it)
                let sha = "";
                const checkResponse = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}` }
                });
                
                if (checkResponse.ok) {
                    const fileData = await checkResponse.json();
                    sha = fileData.sha;
                }

                // 2. Perform the Upload/Update action
                status.innerText = "Pushing to repository...";
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${GITHUB_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `Automated update: ${file.name}`,
                        content: base64Content,
                        sha: sha || undefined // Sends SHA if file exists, otherwise leaves undefined for new files
                    })
                });

                if (response.ok) {
                    status.innerText = "🚀 Success! Uploaded to GitHub.";
                    status.style.color = "#00c853";
                    fileInput.value = ""; // Reset file picker
                } else {
                    const errData = await response.json();
                    status.innerText = `Error: ${errData.message}`;
                    status.style.color = "#ff4d4d";
                }
            } catch (error) {
                status.innerText = "Network error. Check connection.";
                status.style.color = "#ff4d4d";
            }
        };
        
        reader.readAsDataURL(file);
    }
</script>

</body>
</html>
